name: Release to npm

# Publishes to npm when a version tag (v*) is pushed. Authentication is via
# npm Trusted Publishing (OIDC) — there is NO npm token, in CI or anywhere
# else. The GitHub "Production" environment (restricted to v* tags) gates the
# publish. See PUBLISHING.md.

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    name: Check and publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing (and provenance)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Node setup
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache-dependency-path: package.json
          node-version: "24.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      # tsc-only build from the committed _generated sources: `convex codegen`
      # needs a configured deployment, which CI doesn't have. The test job
      # verifies the committed _generated stays in sync at development time.
      - name: Build
        run: |
          npm run clean
          npm run build

      - name: Check
        run: |
          npm run test
          npm run typecheck
          npm run lint

      # A mistagged push must never publish the wrong version.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish
        # No token: npm authenticates via OIDC (Trusted Publishing) and
        # attaches build provenance automatically. Prerelease versions
        # (e.g. 0.2.0-alpha.0) publish to the "alpha" dist-tag, not "latest".
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          case "$VERSION" in
            *-*) npm publish --access public --tag alpha ;;
            *) npm publish --access public ;;
          esac
